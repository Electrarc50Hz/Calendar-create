<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>日历 Word 生成器</title>
    <script src="https://unpkg.com/docx@8.5.0/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 85%; max-width: 350px; text-align: center; }
        select { width: 45%; padding: 12px; margin: 10px 2%; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; background: #fff; }
        button { width: 100%; padding: 15px; background: #0076FF; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; margin-top: 20px; cursor: pointer; }
        button:disabled { background: #ccc; }
        #msg { margin-top: 15px; font-size: 13px; color: #666; min-height: 1.5em; }
    </style>
</head>
<body>

<div class="box">
    <h3 style="margin-top:0">📅 日历文档生成</h3>
    <select id="y"></select>
    <select id="m"></select>
    <button id="btn" disabled>正在初始化...</button>
    <div id="msg">请稍候，正在加载组件...</div>
</div>

<script>
    const btn = document.getElementById('btn');
    const msg = document.getElementById('msg');
    
    // 检查库是否加载成功
    window.onload = () => {
        if (typeof docx !== 'undefined') {
            btn.disabled = false;
            btn.innerText = "生成并下载 Word";
            msg.innerText = "准备就绪";
        } else {
            msg.innerText = "组件加载失败，请检查网络并刷新";
            msg.style.color = "red";
        }
    };

    // 初始化年月
    const now = new Date();
    const sy = document.getElementById('y');
    const sm = document.getElementById('m');
    for(let i=2024; i<=2030; i++) sy.add(new Option(i+'年', i, i===now.getFullYear(), i===now.getFullYear()));
    for(let i=1; i<=12; i++) sm.add(new Option(i+'月', i, i===(now.getMonth()+1), i===(now.getMonth()+1)));

    btn.onclick = async () => {
        try {
            btn.disabled = true;
            msg.innerText = "正在构建文档...";
            
            const { Document, Packer, Paragraph, Table, TableRow, TableCell, WidthType, AlignmentType, TextRun } = docx;

            const year = parseInt(sy.value);
            const month = parseInt(sm.value);
            
            // 计算日期
            const firstDay = new Date(year, month - 1, 1).getDay();
            const daysInMonth = new Date(year, month, 0).getDate();
            const rows = [];
            
            // 表头
            rows.push(new TableRow({
                children: ["日","一","二","三","四","五","六"].map(d => new TableCell({
                    children: [new Paragraph({ text: d, alignment: AlignmentType.CENTER })],
                    shading: { fill: "F5F5 Balance" }
                }))
            }));

            // 日期填充逻辑
            let currentDay = 1;
            for (let i = 0; i < 6; i++) {
                const cells = [];
                for (let j = 0; j < 7; j++) {
                    let text = "";
                    if ((i === 0 && j >= firstDay) || (i > 0 && currentDay <= daysInMonth)) {
                        text = currentDay.toString();
                        currentDay++;
                    }
                    cells.push(new TableCell({
                        children: [new Paragraph({ children: [new TextRun({ text, bold: true })] })],
                        height: { value: 800, type: 'atLeast' }
                    }));
                }
                rows.push(new TableRow({ children: cells }));
                if (currentDay > daysInMonth) break;
            }

            const doc = new Document({
                sections: [{
                    children: [
                        new Paragraph({ text: `${year}年${month}月`, alignment: AlignmentType.CENTER, spacing: {after: 200} }),
                        new Table({ width: { size: 100, type: WidthType.PERCENTAGE }, rows: rows })
                    ]
                }]
            });

            // 导出
            const blob = await Packer.toBlob(doc);
            const fname = `Calendar_${year}_${month}.docx`;

            // iOS 兼容性下载触发
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = fname;
            document.body.appendChild(a);
            a.click();
            
            // 清理
            setTimeout(() => {
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
                btn.disabled = false;
                msg.innerText = "生成成功！请查看下载项";
            }, 100);

        } catch (e) {
            alert("错误原因: " + e.message);
            btn.disabled = false;
            msg.innerText = "生成失败";
        }
    };
</script>
</body>
</html>
